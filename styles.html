<!-- ============================================================
     SHARED CSS  –  included in every page via <?= include('styles') ?>
     ============================================================ -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg-primary:    #0d0d1a;
    --bg-secondary:  #12122a;
    --bg-card:       #1a1a35;
    --bg-card-hover: #1e1e3d;
    --accent:        #6c63ff;
    --accent-2:      #00d4aa;
    --accent-3:      #ff6b6b;
    --accent-4:      #ffd166;
    --text-primary:  #e8e8f0;
    --text-secondary:#a0a0c0;
    --text-muted:    #666688;
    --border:        rgba(108,99,255,0.2);
    --border-light:  rgba(255,255,255,0.06);
    --shadow:        0 8px 32px rgba(0,0,0,0.4);
    --shadow-glow:   0 0 40px rgba(108,99,255,0.15);
    --radius:        14px;
    --radius-sm:     8px;
    --transition:    0.25s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scrollbar ─────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-secondary); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

  /* ── Sidebar ─────────────────────────────────────────────────  */
  .sidebar {
    position: fixed; top: 0; left: 0;
    width: 240px; height: 100vh;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-light);
    display: flex; flex-direction: column;
    z-index: 100; padding: 0;
    box-shadow: 4px 0 24px rgba(0,0,0,0.3);
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border-light);
  }
  .sidebar-logo .icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .sidebar-logo h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
  .sidebar-logo small { font-size: 10px; color: var(--text-muted); font-weight: 400; }

  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .nav-label {
    font-size: 10px; font-weight: 600; letter-spacing: .08em;
    color: var(--text-muted); text-transform: uppercase;
    padding: 8px 8px 4px; margin-top: 8px;
  }
  .nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    color: var(--text-secondary); text-decoration: none;
    font-size: 13.5px; font-weight: 500;
    transition: all var(--transition); cursor: pointer;
    margin-bottom: 2px; border: none; background: none; width: 100%;
  }
  .nav-link:hover, .nav-link.active {
    background: rgba(108,99,255,0.12);
    color: var(--accent); 
  }
  .nav-link.active { background: rgba(108,99,255,0.18); }
  .nav-link .icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
  .nav-link .badge {
    margin-left: auto; background: var(--accent);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 1px 7px; border-radius: 99px;
  }

  .sidebar-footer {
    padding: 16px; border-top: 1px solid var(--border-light);
    font-size: 11px; color: var(--text-muted);
    text-align: center;
  }

  /* ── Main content ────────────────────────────────────────────  */
  .main { margin-left: 240px; min-height: 100vh; padding: 28px 32px; }

  /* ── Topbar ──────────────────────────────────────────────────  */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .topbar h2 { font-size: 22px; font-weight: 700; }
  .topbar .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  /* ── Buttons ─────────────────────────────────────────────────  */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: var(--radius-sm);
    font-size: 13.5px; font-weight: 600; cursor: pointer;
    border: none; transition: all var(--transition); white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7b74ff; box-shadow: 0 4px 16px rgba(108,99,255,.4); transform: translateY(-1px); }
  .btn-success { background: var(--accent-2); color: #0d0d1a; }
  .btn-success:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-danger  { background: var(--accent-3); color: #fff; }
  .btn-danger:hover  { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-warning { background: var(--accent-4); color: #0d0d1a; }
  .btn-outline {
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.08); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-icon { padding: 8px; }

  /* ── Stat cards ──────────────────────────────────────────────  */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 22px 24px;
    position: relative; overflow: hidden;
    transition: all var(--transition);
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
  .stat-card .glow {
    position: absolute; top: -30px; right: -30px;
    width: 100px; height: 100px; border-radius: 50%;
    opacity: .12; filter: blur(20px);
  }
  .stat-card .label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; }
  .stat-card .value { font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-card .change { font-size: 12px; color: var(--accent-2); margin-top: 6px; }
  .stat-card .stat-icon {
    position: absolute; right: 20px; top: 20px;
    font-size: 28px; opacity: .25;
  }

  /* ── Cards ───────────────────────────────────────────────────  */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 24px;
    margin-bottom: 24px;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .card-header h3 { font-size: 15px; font-weight: 700; }
  .card-header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ── Table ───────────────────────────────────────────────────  */
  .table-wrapper { overflow-x: auto; border-radius: var(--radius-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead tr { background: rgba(108,99,255,.1); }
  th {
    padding: 11px 14px; text-align: left;
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    color: var(--text-muted); text-transform: uppercase;
    white-space: nowrap;
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,.02); }
  tr:last-child td { border-bottom: none; }

  /* ── Badges ──────────────────────────────────────────────────  */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
  }
  .badge-green  { background: rgba(0,212,170,.15); color: var(--accent-2); }
  .badge-purple { background: rgba(108,99,255,.15); color: var(--accent); }
  .badge-red    { background: rgba(255,107,107,.15); color: var(--accent-3); }
  .badge-yellow { background: rgba(255,209,102,.15); color: var(--accent-4); }
  .badge-grey   { background: rgba(255,255,255,.08); color: var(--text-muted); }

  /* ── Forms ───────────────────────────────────────────────────  */
  .form-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  input, select, textarea {
    background: var(--bg-secondary); border: 1px solid var(--border);
    color: var(--text-primary); border-radius: var(--radius-sm);
    padding: 9px 13px; font-size: 13.5px; font-family: inherit;
    transition: border-color var(--transition); width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,.15);
  }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--bg-card); }

  /* ── Modal ───────────────────────────────────────────────────  */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; animation: fadeIn .2s; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; width: 100%;
    max-width: 600px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow);
    animation: slideUp .25s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .modal-header h3 { font-size: 17px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; transition: color var(--transition); }
  .modal-close:hover { color: var(--accent-3); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border-light); }

  /* ── Search ──────────────────────────────────────────────────  */
  .search-bar {
    position: relative; flex: 1;
  }
  .search-bar input { padding-left: 38px; }
  .search-bar::before {
    content: '🔍'; position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); font-size: 14px; z-index: 1;
  }

  /* ── Progress bar ────────────────────────────────────────────  */
  .progress { height: 6px; background: var(--bg-secondary); border-radius: 99px; overflow: hidden; }
  .progress-bar {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width .5s ease;
  }

  /* ── Score ring ──────────────────────────────────────────────  */
  .score-ring {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; border-radius: 50%;
    font-size: 14px; font-weight: 800;
    border: 3px solid;
  }
  .score-ring.high  { border-color: var(--accent-2); color: var(--accent-2); }
  .score-ring.mid   { border-color: var(--accent-4); color: var(--accent-4); }
  .score-ring.low   { border-color: var(--accent-3); color: var(--accent-3); }

  /* ── Toast ───────────────────────────────────────────────────  */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 18px;
    font-size: 13.5px; min-width: 260px;
    box-shadow: var(--shadow); animation: slideIn .25s ease;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.success { border-left: 3px solid var(--accent-2); }
  .toast.error   { border-left: 3px solid var(--accent-3); }
  .toast.info    { border-left: 3px solid var(--accent); }

  /* ── Loader ──────────────────────────────────────────────────  */
  .loader-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(13,13,26,.8); backdrop-filter: blur(3px);
    z-index: 300; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .loader-overlay.show { display: flex; }
  .spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }

  /* ── Empty state ─────────────────────────────────────────────  */
  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── Animations ──────────────────────────────────────────────  */
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes spin    { to { transform: rotate(360deg); } }

  /* ── Responsive ──────────────────────────────────────────────  */
  @media (max-width: 768px) {
    .sidebar { width: 60px; }
    .sidebar-logo h1, .sidebar-logo small, .nav-link span, .nav-label, .sidebar-footer { display: none; }
    .main { margin-left: 60px; padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
