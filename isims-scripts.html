<!-- ISIMS Shared JS -->
<script>
/* ── Session helpers (localStorage) ─────────────────────────── */
var SESSION_KEY = 'rh_session';

function saveSession(data) { localStorage.setItem(SESSION_KEY, JSON.stringify(data)); }
function getSession() { try { return JSON.parse(localStorage.getItem(SESSION_KEY)||'null'); } catch(e){return null;} }
function clearSession() { localStorage.removeItem(SESSION_KEY); }

function requireAuth(requiredRole) {
  var s = getSession();
  if (!s || !s.token) { getUrl('login'); return null; }
  if (requiredRole && s.role !== requiredRole && s.role !== 'admin') {
    getUrl('login'); return null;
  }
  return s;
}

function getUrl(page) {
  // Use google.script.run to get the safe top-level URL and navigate
  callServer('getAppUrl', [], function(err, url) {
    if(!err && url) {
      window.top.location.href = url + '?page=' + page;
    }
  });
}

/* ── Navigation ──────────────────────────────────────────────── */
function navigate(page) {
  showLoader();
  getUrl(page);
}

function doLogout() {
  var s = getSession();
  if (s && s.token) {
    google.script.run.logout(s.token);
  }
  clearSession();
  getUrl('login');
}

/* ── Server bridge ───────────────────────────────────────────── */
function callServer(fn, args, cb) {
  showLoader();
  google.script.run
    .withSuccessHandler(function(res){ hideLoader(); cb(null,res); })
    .withFailureHandler(function(err){ hideLoader(); cb(err,null); showToast(err.message||'Erreur serveur','error'); })
    [fn].apply(null, args||[]);
}

/* ── Loader ──────────────────────────────────────────────────── */
function showLoader() { var el=document.getElementById('loader'); if(el) el.classList.add('show'); }
function hideLoader() { var el=document.getElementById('loader'); if(el) el.classList.remove('show'); }

/* ── Toast ───────────────────────────────────────────────────── */
function showToast(msg, type) {
  type = type||'info';
  var icons = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  var el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = '<span style="font-size:16px">'+(icons[type]||'ℹ️')+'</span><span>'+msg+'</span>';
  var tc = document.getElementById('toast-container');
  if(tc) tc.appendChild(el);
  setTimeout(function(){ el.remove(); }, 4000);
}

/* ── Modal ───────────────────────────────────────────────────── */
function openModal(id)  { var el=document.getElementById(id); if(el) el.classList.add('open'); }
function closeModal(id) { var el=document.getElementById(id); if(el) el.classList.remove('open'); }

/* ── Utilities ───────────────────────────────────────────────── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d){ if(!d) return '–'; var dt=new Date(d); return isNaN(dt)?d:dt.toLocaleDateString('fr-FR'); }

function statusBadge(s){
  var m={
    'Actif':'badge-green','Candidat':'badge-blue','Inactif':'badge-grey',
    'En cours':'badge-blue','Ouverte':'badge-yellow','Terminée':'badge-green','Annulée':'badge-red',
    'Approuvée':'badge-green','En attente':'badge-yellow','Refusée':'badge-red',
    'Haute':'badge-red','Normale':'badge-blue','Faible':'badge-grey',
    'Traité':'badge-green','Erreur':'badge-red',
    'Débutant':'badge-grey','Intermédiaire':'badge-blue','Avancé':'badge-green','Expert':'badge-orange'
  };
  return '<span class="badge '+(m[s]||'badge-grey')+'">'+esc(s||'–')+'</span>';
}

function miniBar(pct, color){
  return '<div class="progress"><div class="progress-bar" style="width:'+Math.min(100,pct)+'%;background:'+color+'"></div></div>';
}

function confirmAction(msg, cb){ if(window.confirm(msg)) cb(); }

/* ── Header user info ────────────────────────────────────────── */
function renderHeaderUser() {
  var s = getSession();
  if(!s) return;
  var el = document.getElementById('header-user');
  if(!el) return;
  var initials = ((s.nom||'?')[0]+(s.prenom||'')[0]).toUpperCase();
  el.innerHTML =
    '<div class="avatar">'+esc(initials)+'</div>'+
    '<span>'+esc(s.nom+' '+s.prenom)+'</span>'+
    ' <span style="opacity:.6;font-size:11px">('+esc(s.role)+')</span>';

  // Show first-login hint
  if (s.firstLogin) {
    setTimeout(function() {
      showToast('🔑 Première connexion : votre CIN est votre mot de passe par défaut. Vous pouvez le changer dans votre profil.', 'warning');
    }, 800);
  }

  // Inject notification bell into header
  injectNotifBell();
  loadNotifications();
}

/* ── Notification Bell ───────────────────────────────────────── */
var _notifTimer = null;

function injectNotifBell() {
  if (document.getElementById('notif-bell-wrap')) return;
  var header = document.querySelector('.header-inner');
  if (!header) return;

  var wrap = document.createElement('div');
  wrap.id = 'notif-bell-wrap';
  wrap.style.cssText = 'position:relative;margin-right:4px';
  wrap.innerHTML =
    '<button id="notif-bell-btn" onclick="toggleNotifDropdown()" style="'+
      'background:rgba(255,255,255,0.1);border:none;border-radius:8px;'+
      'cursor:pointer;padding:8px 10px;font-size:18px;position:relative;color:white;'+
      'transition:background .2s" title="Notifications">'+
      '🔔'+
      '<span id="notif-count-badge" style="'+
        'display:none;position:absolute;top:2px;right:2px;'+
        'background:#ef4444;color:white;border-radius:10px;'+
        'font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center'+
      '">0</span>'+
    '</button>'+
    '<div id="notif-dropdown" style="'+
      'display:none;position:absolute;top:46px;right:0;width:320px;'+
      'background:white;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);'+
      'border:1px solid #e5e7eb;z-index:9999;overflow:hidden'+
    '">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;'+
        'padding:14px 16px;border-bottom:1px solid #f3f4f6;background:#f8fafc">'+
        '<strong style="font-size:14px;color:#1e293b">🔔 Notifications</strong>'+
        '<button onclick="markAllRead()" style="font-size:11px;color:#3b82f6;background:none;border:none;cursor:pointer">Tout lire</button>'+
      '</div>'+
      '<div id="notif-list" style="max-height:320px;overflow-y:auto;padding:8px 0"></div>'+
    '</div>';

  // Insert bell before the logout button
  var logoutBtn = header.querySelector('button');
  header.insertBefore(wrap, logoutBtn);

  // Close dropdown on outside click
  document.addEventListener('click', function(e) {
    if (!wrap.contains(e.target)) {
      document.getElementById('notif-dropdown').style.display = 'none';
    }
  });
}

function toggleNotifDropdown() {
  var dd = document.getElementById('notif-dropdown');
  if (!dd) return;
  var isOpen = dd.style.display === 'block';
  dd.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) loadNotifications();
}

function loadNotifications() {
  var s = getSession();
  if (!s) return;
  google.script.run
    .withSuccessHandler(function(notifs) {
      renderNotifDropdown(notifs || []);
      var unread = (notifs||[]).filter(function(n){ return n['Lu']==='non'; }).length;
      var badge = document.getElementById('notif-count-badge');
      if (badge) {
        badge.textContent = unread;
        badge.style.display = unread > 0 ? 'inline' : 'none';
      }
    })
    .withFailureHandler(function(){})
    .getMyNotifications(s.cin, s.role);

  // Poll every 60 seconds
  clearTimeout(_notifTimer);
  _notifTimer = setTimeout(loadNotifications, 60000);
}

function renderNotifDropdown(notifs) {
  var list = document.getElementById('notif-list');
  if (!list) return;
  if (!notifs.length) {
    list.innerHTML = '<div style="text-align:center;padding:24px;color:#94a3b8;font-size:13px">✅ Aucune notification</div>';
    return;
  }
  var typeColors = { info:'#3b82f6', success:'#22c55e', warning:'#f59e0b', danger:'#ef4444' };
  var typeIcons  = { info:'ℹ️', success:'✅', warning:'⚠️', danger:'❌' };
  list.innerHTML = notifs.map(function(n) {
    var isUnread = n['Lu'] === 'non';
    var color = typeColors[n['Type']] || '#3b82f6';
    var icon  = typeIcons[n['Type']]  || 'ℹ️';
    var dt    = n['Date'] ? new Date(n['Date']).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    return '<div onclick="onNotifClick(\''+esc(n['ID'])+'\',\''+esc(n['ActionURL'])+'\')" style="'+
      'display:flex;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s;'+
      (isUnread ? 'background:#eff6ff;' : 'background:white;')+
      'border-bottom:1px solid #f1f5f9" '+
      'onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\''+(isUnread?'#eff6ff':'white')+'\'">'+
      '<div style="font-size:18px;flex-shrink:0">'+icon+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:12px;color:#1e293b;line-height:1.4;'+(isUnread?'font-weight:600;':'')+
          'overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+
          esc(n['Message'])+
        '</div>'+
        '<div style="font-size:10px;color:#94a3b8;margin-top:3px">'+dt+'</div>'+
      '</div>'+
      (isUnread ? '<div style="width:7px;height:7px;background:'+color+';border-radius:50%;flex-shrink:0;margin-top:4px"></div>' : '')+
    '</div>';
  }).join('');
}

function onNotifClick(notifId, actionURL) {
  // Mark as read
  var s = getSession();
  if (s) {
    google.script.run
      .withSuccessHandler(function(){ loadNotifications(); })
      .withFailureHandler(function(){})
      .markNotificationRead(notifId);
  }
  // Navigate if action defined
  if (actionURL && actionURL.trim()) {
    document.getElementById('notif-dropdown').style.display = 'none';
    navigate(actionURL.trim());
  }
}

function markAllRead() {
  var s = getSession();
  if (!s) return;
  google.script.run
    .withSuccessHandler(function(){ loadNotifications(); })
    .withFailureHandler(function(){})
    .markAllNotificationsRead(s.cin, s.role);
}

/* ── Sidebar builder ─────────────────────────────────────────── */
function buildIsimsNav(active, role) {
  var navEl = document.getElementById('isims-sidebar-nav');
  if(!navEl) return;
  var links = role==='admin' ? [
    {page:'admin-dashboard', icon:'📊', label:'Tableau de bord'},
    {page:'employees',       icon:'👥', label:'Employés'},
    {page:'missions',        icon:'🎯', label:'Missions'},
    {page:'postes',          icon:'📁', label:'Postes'},
    {page:'tasks-page',      icon:'📋', label:'Tâches'},
    {page:'absences',        icon:'📅', label:'Absences'},
    {page:'recommendation',  icon:'🤖', label:'Recommandations'},
    {page:'documents',       icon:'📂', label:'Documents RH'}
  ] : [
    {page:'emp-dashboard',   icon:'🏠', label:'Mon profil'},
    {page:'skills-form',     icon:'🎓', label:'Mes compétences'},
    {page:'tasks-page',      icon:'📋', label:'Mes tâches'},
    {page:'absences',        icon:'📅', label:'Mes absences'}
  ];

  navEl.innerHTML = links.map(function(l){
    return '<button class="sidebar-item'+(l.page===active?' active':'')+'" onclick="navigate(\''+l.page+'\')">'
      +'<span class="s-icon">'+l.icon+'</span><span>'+l.label+'</span></button>';
  }).join('');
}

/* ── DOM ready ───────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function(){
  // Close modal on overlay click
  document.querySelectorAll('.modal-overlay').forEach(function(ov){
    ov.addEventListener('click', function(e){ if(e.target===ov) ov.classList.remove('open'); });
  });
  renderHeaderUser();
});
</script>
